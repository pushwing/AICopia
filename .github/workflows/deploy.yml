name: Deploy

# main에 머지(push)되면 잡이 큐에 들어가고, production 환경의
# Required reviewers 승인을 받은 뒤에야 SSH 배포가 실행된다(= 머지 후 수동 승인).
# 수동 재배포가 필요하면 Actions 탭에서 workflow_dispatch로도 실행 가능.
on:
  push:
    branches: [main]
  workflow_dispatch:

# 배포는 한 번에 하나만. 진행 중 배포를 끊지 않는다.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 운영 배포 (수동 승인)
    runs-on: ubuntu-latest
    # 이 environment에 Required reviewers를 설정하면 승인 게이트가 된다.
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: SSH 배포
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # 1) 최신 main 반영 (.env·gitignore된 스켈레톤 등 untracked 파일은 보존됨)
            git fetch --all --prune
            git reset --hard origin/main

            # 2) 운영 의존성 설치
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            # 3) (권장) 마이그레이션 전 DB 백업 — 운영 DB 안전장치.
            #    서버에 mysqldump가 있고 .env DB 정보를 쓸 수 있으면 주석 해제해 사용.
            # mkdir -p writable/backups
            # mysqldump -h "$DB_HOST" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" \
            #   > "writable/backups/$(date +%F_%H%M%S).sql"

            # 4) DB 마이그레이션 (자동)
            php spark migrate --all

            # 5) 캐시 초기화
            php spark cache:clear
